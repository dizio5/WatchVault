spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  flyway:
    enabled: false
management:
  endpoint:
    health:
      show-details: always
springdoc:
  api-docs:
    enabled: true
