spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  flyway:
    enabled: true
    validate-on-migrate: true
    locations: classpath:db/migration
management:
  endpoint:
    health:
      show-details: never
springdoc:
  api-docs:
    enabled: true
security:
  jwt:
    secret: ${JWT_SECRET}
tmdb:
  base-url: ${TMDB_BASE_URL}
  token: ${TMDB_TOKEN}
